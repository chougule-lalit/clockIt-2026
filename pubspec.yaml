name: clockit
description: "Offline-First Timesheet & Task Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database (Drift = type-safe SQLite ORM, Dart 3 compatible)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.0

  # Routing
  go_router: ^14.6.2

  # Simple KV storage (onboarding flag)
  shared_preferences: ^2.5.2

  # Typography
  google_fonts: ^6.2.1

  # Notifications (stubbed in Phase 1)
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
